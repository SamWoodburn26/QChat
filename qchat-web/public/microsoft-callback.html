<!DOCTYPE html>
<html>
<head>
  <title>Microsoft Login</title>
</head>
<body>
  <script>
    function readPopupContext() {
      try {
        return window.name ? JSON.parse(window.name) : {};
      } catch {
        return {};
      }
    }

    function cleanupState(state) {
      if (!state) return;
      localStorage.removeItem(`ms.pkce.verifier.${state}`);
      localStorage.removeItem(`ms.oauth.nonce.${state}`);
      localStorage.removeItem(`ms.oauth.redirectUri.${state}`);
      localStorage.removeItem(`ms.oauth.openerOrigin.${state}`);
      window.name = '';
    }

    function postError(message) {
      const query = new URLSearchParams(window.location.search);
      const state = query.get('state');
      const popupContext = readPopupContext();
      const openerOrigin = popupContext.openerOrigin || (state ? localStorage.getItem(`ms.oauth.openerOrigin.${state}`) : null) || window.location.origin;

      if (window.opener) {
        window.opener.postMessage({
          type: 'microsoft-login-error',
          error: message
        }, openerOrigin);
      }

      cleanupState(state);
      window.close();
    }

    async function completeMicrosoftLogin() {
      const query = new URLSearchParams(window.location.search);
      const code = query.get('code');
      const state = query.get('state');
      const error = query.get('error');
      const errorDescription = query.get('error_description');

      if (error) {
        postError(errorDescription || error);
        return;
      }

      if (!code || !state) {
        postError('Missing authorization response from Microsoft.');
        return;
      }

      const popupContext = readPopupContext();
      const verifierKey = `ms.pkce.verifier.${state}`;
      const nonceKey = `ms.oauth.nonce.${state}`;
      const redirectKey = `ms.oauth.redirectUri.${state}`;
      const openerOriginKey = `ms.oauth.openerOrigin.${state}`;
      const codeVerifier = (popupContext.state === state ? popupContext.codeVerifier : '') || localStorage.getItem(verifierKey);
      const expectedNonce = (popupContext.state === state ? popupContext.nonce : '') || localStorage.getItem(nonceKey);
      const redirectUri = popupContext.redirectUri || localStorage.getItem(redirectKey) || `${window.location.origin}/microsoft-callback.html`;
      const openerOrigin = popupContext.openerOrigin || localStorage.getItem(openerOriginKey) || window.location.origin;

      cleanupState(state);

      if (!codeVerifier) {
        postError('Missing PKCE verifier for Microsoft login.');
        return;
      }

      const exchangeResp = await fetch('/api/auth', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          action: 'microsoft_exchange_code',
          code,
          codeVerifier,
          redirectUri,
          expectedNonce,
        })
      });

      const exchangeJson = await exchangeResp.json();
      if (!exchangeResp.ok || !exchangeJson.success) {
        postError(exchangeJson.error || exchangeJson.details || 'Microsoft token exchange failed.');
        return;
      }

      if (window.opener) {
        window.opener.postMessage({
          type: 'microsoft-login',
          email: exchangeJson.username,
          name: exchangeJson.name
        }, openerOrigin);
      }

      window.close();
    }

    completeMicrosoftLogin().catch((err) => {
      postError(err && err.message ? err.message : 'Microsoft login failed.');
    });
  </script>
  <p>Processing login...</p>
</body>
</html>
